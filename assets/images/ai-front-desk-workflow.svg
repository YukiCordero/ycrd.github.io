<svg viewBox="0 0 1020 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="afdTitle afdDesc" font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif">
  <title id="afdTitle">AI Front Desk — multi-tenant n8n architecture</title>
  <desc id="afdDesc">One webhook and a shared Airtable base serve many client businesses. Leads enter through a single webhook, an AI agent qualifies and replies, everything is stored in Airtable, and six scheduled workflows handle the full lead lifecycle.</desc>

  <defs>
    <linearGradient id="afdBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#0A1120"/>
      <stop offset="1" stop-color="#070C16"/>
    </linearGradient>
    <radialGradient id="afdGlow" cx="0.12" cy="0" r="0.9">
      <stop offset="0" stop-color="#D8B170" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#D8B170" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="afdGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4D28A"/>
      <stop offset="1" stop-color="#C99A42"/>
    </linearGradient>
    <marker id="afdArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D8B170"/>
    </marker>
    <pattern id="afdDots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.1" fill="#F8EFD8" fill-opacity="0.035"/>
    </pattern>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="1020" height="520" rx="20" fill="url(#afdBg)"/>
  <rect x="0" y="0" width="1020" height="520" rx="20" fill="url(#afdDots)"/>
  <rect x="0" y="0" width="1020" height="520" rx="20" fill="url(#afdGlow)"/>
  <rect x="0.75" y="0.75" width="1018.5" height="518.5" rx="19.25" fill="none" stroke="#D8B170" stroke-opacity="0.22"/>

  <!-- Header -->
  <text x="40" y="50" fill="#F8EFD8" font-size="25" font-weight="800" letter-spacing="-0.5">AI Front Desk — Multi-Tenant n8n System</text>
  <text x="40" y="76" fill="#AAB2C1" font-size="13.5" font-weight="500">One webhook and one shared database serve many client businesses.</text>
  <!-- multi-tenant chip -->
  <rect x="712" y="30" width="268" height="34" rx="17" fill="#D8B170" fill-opacity="0.08" stroke="#D8B170" stroke-opacity="0.38"/>
  <circle cx="734" cy="47" r="4" fill="url(#afdGold)"/>
  <text x="746" y="51.5" fill="#F4D28A" font-size="12.5" font-weight="700">client_id → loads each client's config</text>

  <!-- ============ Intake column ============ -->
  <!-- N1 form -->
  <rect x="40" y="112" width="252" height="58" rx="14" fill="#131C2E" stroke="#F8EFD8" stroke-opacity="0.13"/>
  <circle cx="64" cy="141" r="5" fill="#AAB2C1"/>
  <text x="80" y="137" fill="#F8EFD8" font-size="14.5" font-weight="700">Website form / chat widget</text>
  <text x="80" y="155" fill="#AAB2C1" font-size="11.5">any client site, tagged with client_id</text>
  <!-- arrow -->
  <line x1="166" y1="170" x2="166" y2="194" stroke="#D8B170" stroke-width="2" marker-end="url(#afdArrow)"/>

  <!-- N2 webhook -->
  <rect x="40" y="196" width="252" height="58" rx="14" fill="#1A2136" stroke="#D8B170" stroke-opacity="0.5"/>
  <circle cx="64" cy="225" r="5" fill="url(#afdGold)"/>
  <text x="80" y="221" fill="#F8EFD8" font-size="14.5" font-weight="800">Webhook · POST /lead-intake</text>
  <text x="80" y="239" fill="#AAB2C1" font-size="11.5">single omni-tenant entry point</text>
  <!-- arrow -->
  <line x1="166" y1="254" x2="166" y2="278" stroke="#D8B170" stroke-width="2" marker-end="url(#afdArrow)"/>

  <!-- N3 AI agent -->
  <rect x="40" y="280" width="252" height="74" rx="14" fill="#20283F" stroke="url(#afdGold)" stroke-opacity="0.75" stroke-width="1.4"/>
  <circle cx="64" cy="313" r="5.5" fill="url(#afdGold)"/>
  <text x="80" y="308" fill="#F8EFD8" font-size="15" font-weight="800">AI Agent · Groq LLM</text>
  <text x="80" y="326" fill="#F4D28A" font-size="11.5" font-weight="600">approved facts only · structured JSON</text>
  <text x="80" y="343" fill="#AAB2C1" font-size="11.5">qualify · score Hot / Warm / Cold · reply</text>
  <!-- arrow to escalate -->
  <line x1="166" y1="354" x2="166" y2="378" stroke="#D8B170" stroke-width="2" marker-end="url(#afdArrow)"/>

  <!-- N4 escalation -->
  <rect x="40" y="380" width="252" height="54" rx="14" fill="#131C2E" stroke="#E7B267" stroke-opacity="0.4" stroke-dasharray="5 4"/>
  <circle cx="64" cy="407" r="5" fill="#E7B267"/>
  <text x="80" y="403" fill="#F8EFD8" font-size="13.5" font-weight="700">Human escalation → staff email</text>
  <text x="80" y="420" fill="#AAB2C1" font-size="11">medical Qs · complaints · "talk to a human"</text>

  <!-- ============ Airtable datastore ============ -->
  <!-- connector AI -> Airtable -->
  <path d="M292 317 C 322 317, 330 250, 360 250" fill="none" stroke="#D8B170" stroke-width="2" marker-end="url(#afdArrow)"/>
  <!-- cylinder -->
  <g>
    <path d="M360 190 h150 v120 a75 20 0 0 1 -150 0 z" fill="#1A2136" stroke="#D8B170" stroke-opacity="0.5"/>
    <ellipse cx="435" cy="190" rx="75" ry="20" fill="#20283F" stroke="#D8B170" stroke-opacity="0.6"/>
    <text x="435" y="185" text-anchor="middle" fill="#F4D28A" font-size="12" font-weight="800">AIRTABLE</text>
    <text x="435" y="228" text-anchor="middle" fill="#F8EFD8" font-size="14.5" font-weight="800">Leads + Clients</text>
    <text x="435" y="248" text-anchor="middle" fill="#AAB2C1" font-size="11.5">shared source of truth</text>
    <text x="435" y="284" text-anchor="middle" fill="#AAB2C1" font-size="10.5" font-opacity="0.9">New → Nurturing → Booked → Won</text>
  </g>
  <!-- clients config feeds AI (dashed) -->
  <path d="M360 210 C 320 200, 300 250, 292 300" fill="none" stroke="#AAB2C1" stroke-width="1.3" stroke-dasharray="4 4" stroke-opacity="0.55"/>

  <!-- ============ Scheduled lifecycle panel ============ -->
  <!-- connector Airtable -> panel -->
  <line x1="510" y1="250" x2="596" y2="250" stroke="#D8B170" stroke-width="2" marker-end="url(#afdArrow)"/>
  <rect x="600" y="104" width="380" height="330" rx="18" fill="#F8EFD8" fill-opacity="0.028" stroke="#F8EFD8" stroke-opacity="0.12"/>
  <text x="620" y="134" fill="#F4D28A" font-size="13.5" font-weight="800">Scheduled lifecycle workflows</text>
  <text x="620" y="152" fill="#AAB2C1" font-size="11">six jobs that read &amp; write the shared Airtable base</text>
  <line x1="620" y1="164" x2="960" y2="164" stroke="#F8EFD8" stroke-opacity="0.1"/>

  <!-- chips: 2 cols x 3 rows -->
  <!-- row 1 -->
  <g>
    <rect x="618" y="176" width="172" height="72" rx="12" fill="#131C2E" stroke="#F8EFD8" stroke-opacity="0.11"/>
    <text x="632" y="200" fill="#F4D28A" font-size="12" font-weight="800">1</text>
    <text x="648" y="200" fill="#F8EFD8" font-size="12.5" font-weight="700">Unbooked Follow-Up</text>
    <text x="632" y="220" fill="#AAB2C1" font-size="10.5">daily · 4-stage nurture,</text>
    <text x="632" y="235" fill="#AAB2C1" font-size="10.5">auto-stops on booking</text>

    <rect x="808" y="176" width="172" height="72" rx="12" fill="#131C2E" stroke="#F8EFD8" stroke-opacity="0.11"/>
    <text x="822" y="200" fill="#F4D28A" font-size="12" font-weight="800">2</text>
    <text x="838" y="200" fill="#F8EFD8" font-size="12.5" font-weight="700">Booking Capture</text>
    <text x="822" y="220" fill="#AAB2C1" font-size="10.5">Google Calendar event</text>
    <text x="822" y="235" fill="#AAB2C1" font-size="10.5">flips lead → Booked</text>
  </g>
  <!-- row 2 -->
  <g>
    <rect x="618" y="258" width="172" height="72" rx="12" fill="#131C2E" stroke="#F8EFD8" stroke-opacity="0.11"/>
    <text x="632" y="282" fill="#F4D28A" font-size="12" font-weight="800">3</text>
    <text x="648" y="282" fill="#F8EFD8" font-size="12.5" font-weight="700">Appointment Reminders</text>
    <text x="632" y="302" fill="#AAB2C1" font-size="10.5">hourly · 24h + 2h flags,</text>
    <text x="632" y="317" fill="#AAB2C1" font-size="10.5">no double-sends</text>

    <rect x="808" y="258" width="172" height="72" rx="12" fill="#131C2E" stroke="#F8EFD8" stroke-opacity="0.11"/>
    <text x="822" y="282" fill="#F4D28A" font-size="12" font-weight="800">4</text>
    <text x="838" y="282" fill="#F8EFD8" font-size="12.5" font-weight="700">Post-Visit / No-Show</text>
    <text x="822" y="302" fill="#AAB2C1" font-size="10.5">review request or</text>
    <text x="822" y="317" fill="#AAB2C1" font-size="10.5">friendly rebooking</text>
  </g>
  <!-- row 3 -->
  <g>
    <rect x="618" y="340" width="172" height="72" rx="12" fill="#131C2E" stroke="#F8EFD8" stroke-opacity="0.11"/>
    <text x="632" y="364" fill="#F4D28A" font-size="12" font-weight="800">5</text>
    <text x="648" y="364" fill="#F8EFD8" font-size="12.5" font-weight="700">Reactivation</text>
    <text x="632" y="384" fill="#AAB2C1" font-size="10.5">weekly win-back for</text>
    <text x="632" y="399" fill="#AAB2C1" font-size="10.5">clients lapsed 56+ days</text>

    <rect x="808" y="340" width="172" height="72" rx="12" fill="#131C2E" stroke="#F8EFD8" stroke-opacity="0.11"/>
    <text x="822" y="364" fill="#F4D28A" font-size="12" font-weight="800">6</text>
    <text x="838" y="364" fill="#F8EFD8" font-size="12.5" font-weight="700">Staff Daily Digest</text>
    <text x="822" y="384" fill="#AAB2C1" font-size="10.5">7:30 per-client summary,</text>
    <text x="822" y="399" fill="#AAB2C1" font-size="10.5">skips zero-activity days</text>
  </g>

  <!-- footer stack -->
  <text x="40" y="470" fill="#AAB2C1" font-size="11.5" font-weight="600" letter-spacing="0.3">Stack:  n8n  ·  Airtable  ·  Groq LLM  ·  Gmail  ·  Google Calendar</text>
  <text x="40" y="492" fill="#7E889A" font-size="10.5">Add a business = add one Clients row. No workflow edits.</text>
</svg>
